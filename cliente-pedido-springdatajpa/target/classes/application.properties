# ----------------------------
# App
# ----------------------------
spring.application.name=app
server.port=8080

# ----------------------------
# Datasource (MySQL)
# ----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/DB_NAME?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------
# JPA / Hibernate
# ----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Opcional (si quieres fijar el dialect explícitamente)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ----------------------------
# Jackson (por si acaso)
# ----------------------------
spring.jackson.serialization.indent_output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Madrid